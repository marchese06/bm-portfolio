name: Update Squeeze Scores

on:
  schedule:
    # Every 30 min Mon-Fri during US market hours (9am-5pm ET = 1pm-9pm UTC)
    - cron: '0,30 13-21 * * 1-5'
  workflow_dispatch:   # also allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch squeeze scores
        env:
          TD_KEY: ${{ secrets.TD_KEY }}
        run: python fetch_scores.py

      - name: Commit and push scores.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scores.json
          git diff --staged --quiet || git commit -m "Update squeeze scores [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
